server {
    listen 80;
    server_name ccj.infocom.yzu.edu.tw;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ccj.infocom.yzu.edu.tw;

    ssl_certificate /etc/letsencrypt/live/ccj.infocom.yzu.edu.tw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ccj.infocom.yzu.edu.tw/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 100M;

    location = /taskmind {
        return 301 /taskmind/;
    }

    location = /taskmind-health {
        proxy_pass http://taskmind_app/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location /taskmind/files/ {
        alias /app/files/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /taskmind/static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /taskmind/api/ {
        add_header X-Debug-Edge-Nginx yes always;

        proxy_pass http://taskmind_app/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-CSRFToken $http_x_csrftoken;
        proxy_set_header X-Script-Name /taskmind;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /taskmind/ {
        add_header X-Debug-Edge-Nginx yes always;

        proxy_pass http://taskmind_app/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-CSRFToken $http_x_csrftoken;
        proxy_set_header X-Script-Name /taskmind/;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
