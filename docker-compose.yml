version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
        python manage.py collectstatic --noinput --clear &&
        python manage.py migrate &&
        python manage.py create_default_user &&
        gunicorn yzuic114_webstudy.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4 --worker-class gthread --timeout 120 --graceful-timeout 30 --keep-alive 30 --access-logfile - --error-logfile -
      "
    env_file:
      - .env
    environment:
      DB_NAME: yzuic114_stamindtask
      DB_USER: henry
      DB_PASSWORD: henry_yzuic
      DB_HOST: db
      DB_PORT: 5432
      PROCESS_ON_PRODUCTION: True
    volumes:
      - ./static_data:/app/static
      - ./media_data:/app/files
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: yzuic114_stamindtask
      POSTGRES_USER: henry
      POSTGRES_PASSWORD: henry_yzuic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

